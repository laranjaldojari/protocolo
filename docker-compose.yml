services:
  postgres:
    image: postgres:16-alpine
    container_name: protocolo_pg
    environment:
      POSTGRES_USER: protocolo
      POSTGRES_PASSWORD: protocolo
      POSTGRES_DB: protocolo_ldj
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]

  redis:
    image: redis:7-alpine
    container_name: protocolo_redis
    ports: ["6379:6379"]

volumes:
  pgdata:
